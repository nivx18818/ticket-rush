services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP: api
    ports:
      - '3001:3001'
    env_file:
      - apps/api/.env

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP: web
    depends_on:
      - api
    ports:
      - '3000:3000'
